<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Activate License</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:sans-serif;
}

body{
    width:100%;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#111;
}

.box{
    width:350px;
    background:#222;
    padding:30px;
    border-radius:25px;
    text-align:center;
}

h1{
    color:white;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    margin-bottom:15px;
    font-size:16px;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#00bfff;
    color:white;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}

p{
    color:#999;
    margin-top:15px;
}

</style>
</head>

<body>

<div class="box">

    <h1>ENTER LICENSE</h1>

    <input
    type="text"
    id="key"
    placeholder="Enter your key">

    <button id="activateBtn">
        Activate
    </button>

    <p>Buy key from owner</p>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const SUPABASE_URL =
"https://utgjjpjxomkwpnshtxlr.supabase.co";

const SUPABASE_KEY =
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV0Z2pqcGp4b21rd3Buc2h0eGxyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwNTMwMDIsImV4cCI6MjA5NTYyOTAwMn0.RXv5Gg369huUOKmgqsou4PkoeYwWO2-S9TzHu2a2-40";

const client =
window.supabase.createClient(
    SUPABASE_URL,
    SUPABASE_KEY
);

document
.getElementById("activateBtn")
.addEventListener("click", async () => {

    const key =
    document
    .getElementById("key")
    .value
    .trim();

    if(!key){

        alert("กรุณาใส่ License");

        return;

    }

    try{

        const { data, error } =
await client
.from("licenses")
.select("*")
.eq("license_key", key)
.single();

console.log("DATA =", data);
console.log("ERROR =", error);

if(error){

    alert(
        "ERROR: " +
        JSON.stringify(error)
    );

    return;
}

if(!data){

    alert("ไม่พบ License");

    return;
}

        if(error || !data){

            alert("License ไม่ถูกต้อง");

            return;

        }

        let device =
        localStorage.getItem("device");

        if(!device){

            device =
            crypto.randomUUID();

            localStorage.setItem(
                "device",
                device
            );

        }

        if(!data.device_id){

            const { error:updateError } =
            await client
            .from("licenses")
            .update({
                device_id:device
            })
            .eq("license_key", key);

            if(updateError){

                alert("บันทึก License ไม่สำเร็จ");

                console.log(updateError);

                return;

            }

            localStorage.setItem(
                "licensed",
                "yes"
            );

            location.href =
            "game.html";

            return;

        }

        if(data.device_id !== device){

            alert(
                "คีย์นี้ถูกใช้แล้ว"
            );

            return;

        }

        localStorage.setItem(
            "licensed",
            "yes"
        );

        location.href =
        "game.html";

    }

    catch(err){

        console.error(err);

        alert(
            "เกิดข้อผิดพลาด"
        );

    }

});

</script>

</body>
</html>
