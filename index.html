<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Activate License</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:sans-serif;
}

body{
    width:100%;
    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    background:#111;
}

.box{

    width:350px;

    background:#222;

    padding:30px;

    border-radius:25px;

    text-align:center;

    box-shadow:
    0 0 30px rgba(0,0,0,0.5);

}

h1{

    color:white;

    margin-bottom:25px;

    font-size:30px;

}

input{

    width:100%;

    padding:15px;

    border:none;

    outline:none;

    border-radius:15px;

    margin-bottom:20px;

    font-size:16px;

}

button{

    width:100%;

    padding:15px;

    border:none;

    border-radius:15px;

    background:#00bfff;

    color:white;

    font-size:18px;

    cursor:pointer;

    transition:0.2s;

}

button:hover{

    transform:scale(1.03);

}

p{

    color:#aaa;

    margin-top:15px;

    font-size:14px;

}

</style>
</head>

<body>

<div class="box">

    <h1>ENTER LICENSE</h1>

    <input
    type="text"
    id="key"
    placeholder="Enter your key">

   <button id="activateBtn">
    Activate
   </button>

    <p>
        Buy key from owner
    </p>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const SUPABASE_URL =
"https://utgjjpjxomkwpnshtxlr.supabase.co";

const SUPABASE_KEY =
"sb_publishable_EuTcaEx03qUeImpLmt_-TQ_SCN8qqsH";

const supabase =
window.supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);

<script>

const SUPABASE_URL =
"https://utgjjpjxomkwpnshtxlr.supabase.co";

const SUPABASE_KEY =
"ใส่ publishable key";

const supabase =
window.supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);

document
.getElementById("activateBtn")
.addEventListener("click", async ()=>{

    alert("ปุ่มทำงานแล้ว");

    const key =
    document.getElementById("key").value;

    if(!key){

        alert("กรุณาใส่ License");

        return;
    }

    let device =
    localStorage.getItem("device");

    if(!device){

        device = crypto.randomUUID();

        localStorage.setItem(
            "device",
            device
        );
    }

    const { data, error } =
    await supabase
    .from("licenses")
    .select("*")
    .eq("license_key", key)
    .single();

    if(error || !data){

        alert("License ไม่ถูกต้อง");

        return;
    }

    if(data.active !== true){

        alert("License ถูกปิด");

        return;
    }

    if(!data.device_id){

        await supabase
        .from("licenses")
        .update({
            device_id:device
        })
        .eq("license_key", key);

        localStorage
        .setItem(
            "licensed",
            "yes"
        );

        location.href="game.html";

        return;
    }

    if(data.device_id !== device){

        alert("คีย์นี้ถูกใช้แล้ว");

        return;
    }

    localStorage
    .setItem(
        "licensed",
        "yes"
    );

    location.href="game.html";

});

</script>

</body>
</html>
