<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Activate License</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:sans-serif;
}

body{

    width:100%;
    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    background:#111;

}

.box{

    width:350px;

    background:#222;

    padding:30px;

    border-radius:25px;

    text-align:center;

}

h1{

    color:white;

    margin-bottom:20px;

}

input{

    width:100%;

    padding:15px;

    border:none;

    border-radius:12px;

    margin-bottom:15px;

    font-size:16px;

}

button{

    width:100%;

    padding:15px;

    border:none;

    border-radius:12px;

    background:#00bfff;

    color:white;

    font-size:18px;

    cursor:pointer;

}

button:hover{

    opacity:0.9;

}

p{

    color:#999;

    margin-top:15px;

}

</style>
</head>

<body>

<div class="box">

    <h1>ENTER LICENSE</h1>

    <input
    type="text"
    id="key"
    placeholder="Enter your key">

    <button id="activateBtn">
        Activate
    </button>

    <p>Buy key from owner</p>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const SUPABASE_URL =
"https://utgjjpjxomkwpnshtxlr.supabase.co";

const SUPABASE_KEY =
"ใส่ key ที่ใช้อยู่ตอนนี้";

const supabase =
window.supabase.createClient(
    SUPABASE_URL,
    SUPABASE_KEY
);

document
.getElementById("activateBtn")
.addEventListener("click", async () => {

    const key =
    document
    .getElementById("key")
    .value
    .trim();

    console.log("เริ่มเช็ค");
    console.log("key =", key);

    try {

        const { data, error } =
        await supabase
        .from("licenses")
        .select("*")
        .eq("license_key", key);

        console.log("data =", data);
        console.log("error =", error);

        if(error){
            alert("มี error ดู Console");
            return;
        }

        if(!data || data.length === 0){
            alert("ไม่พบ License");
            return;
        }

        alert("เจอ License แล้ว!");

    } catch(err){

        console.error(err);
        alert("เกิด Exception ดู Console");

    }

});

</script>
</body>
</html>
